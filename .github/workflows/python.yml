name: python

on:
  push:
    branches: [main, develop]
    paths:
      - "python/**"
      - ".github/workflows/python.yml"
  pull_request:
    paths:
      - "python/**"
      - ".github/workflows/python.yml"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: python

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: python/pyproject.toml

      - name: Test
        run: uv run --python ${{ matrix.python-version }} --extra test pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: python/pyproject.toml

      - name: Ruff
        run: uvx ruff check jrif/ tests/

      - name: Pyright
        run: uv run --extra test --with pyright pyright jrif/ tests/
